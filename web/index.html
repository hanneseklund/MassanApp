<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#002e77" />
    <title>MassanApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="assets/css/app.css" />
    <script src="assets/env.js"></script>
    <script src="assets/env.local.js" onerror="void 0"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
    <!-- app.js is an ES module entrypoint that imports every Alpine
         store and view factory and registers them on alpine:init. It
         must be parsed before the Alpine CDN build, which dispatches
         alpine:init via a microtask at the end of its own execution.
         Module scripts are deferred by default. -->
    <script type="module" src="assets/js/app.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  </head>
  <body x-data x-cloak>
    <!-- Top chrome. The upper-left holds a hamburger menu that opens
         a navigation panel; event-gated entries are visible only when
         an event is selected (`$store.app.eventId`). The right-hand
         cluster holds a compact language dropdown with the active flag
         and a user-silhouette icon button that routes to "My Pages". -->
    <header class="chrome">
      <div
        class="chrome__nav"
        x-data="{ navOpen: false }"
        @keydown.escape.window="navOpen = false"
        @click.outside="navOpen = false"
      >
        <button
          class="chrome__nav-toggle"
          type="button"
          aria-haspopup="menu"
          :aria-expanded="navOpen"
          aria-controls="chrome-nav-menu"
          :aria-label="$store.lang.t('chrome.nav_aria')"
          @click="navOpen = !navOpen"
        >
          <svg
            class="chrome__nav-icon"
            viewBox="0 0 24 24"
            aria-hidden="true"
            focusable="false"
          >
            <path
              d="M3 7h18M3 12h18M3 17h18"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
        </button>
        <ul
          id="chrome-nav-menu"
          class="chrome__nav-menu"
          role="menu"
          :aria-label="$store.lang.t('chrome.nav_aria')"
          x-show="navOpen"
          x-cloak
        >
          <li class="chrome__nav-item">
            <button
              type="button"
              class="chrome__nav-link"
              role="menuitem"
              @click="navOpen = false; $store.app.eventId ? $store.app.goEventSubview('home') : $store.app.goCalendar()"
              x-text="$store.app.eventId ? ($store.catalog.eventById($store.app.eventId)?.name || $store.lang.t('title.event_default')) : $store.lang.t('chrome.nav.start')"
            ></button>
          </li>
          <li class="chrome__nav-item" x-show="$store.app.eventId">
            <button
              type="button"
              class="chrome__nav-link"
              role="menuitem"
              @click="navOpen = false; $store.app.goTickets()"
              x-text="$store.lang.t('chrome.nav.my_tickets')"
            ></button>
          </li>
          <li class="chrome__nav-item" x-show="$store.app.eventId">
            <button
              type="button"
              class="chrome__nav-link"
              role="menuitem"
              @click="navOpen = false; $store.app.goEventSubview('food')"
              x-text="$store.lang.t('chrome.nav.food')"
            ></button>
          </li>
          <li class="chrome__nav-item" x-show="$store.app.eventId">
            <button
              type="button"
              class="chrome__nav-link"
              role="menuitem"
              @click="navOpen = false; $store.app.goEventSubview('program')"
              x-text="$store.lang.t('chrome.nav.program')"
            ></button>
          </li>
          <li class="chrome__nav-item" x-show="$store.app.eventId">
            <button
              type="button"
              class="chrome__nav-link"
              role="menuitem"
              @click="navOpen = false; $store.app.goEventSubview('exhibitors')"
              x-text="$store.lang.t('chrome.nav.exhibitors')"
            ></button>
          </li>
          <li class="chrome__nav-item" x-show="$store.app.eventId">
            <button
              type="button"
              class="chrome__nav-link"
              role="menuitem"
              @click="navOpen = false; $store.app.goEventSubview('practical')"
              x-text="$store.lang.t('chrome.nav.practical')"
            ></button>
          </li>
          <li class="chrome__nav-item">
            <button
              type="button"
              class="chrome__nav-link"
              role="menuitem"
              @click="navOpen = false; $store.app.goMe()"
              x-text="$store.lang.t('chrome.nav.my_pages')"
            ></button>
          </li>
          <li class="chrome__nav-item" x-show="$store.app.eventId">
            <button
              type="button"
              class="chrome__nav-link"
              role="menuitem"
              @click="navOpen = false; $store.app.goCalendar()"
              x-text="$store.lang.t('chrome.nav.other_events')"
            ></button>
          </li>
        </ul>
      </div>
      <h1 class="chrome__title" x-text="$store.app.chromeTitle()"></h1>
      <div
        class="chrome__actions"
        role="group"
        :aria-label="$store.lang.t('chrome.lang_aria')"
      >
        <div
          class="chrome__lang-dropdown"
          x-data="{ langOpen: false }"
          @keydown.escape.window="langOpen = false"
          @click.outside="langOpen = false"
        >
          <button
            type="button"
            class="chrome__lang chrome__lang-toggle"
            aria-haspopup="listbox"
            :aria-expanded="langOpen"
            :aria-label="$store.lang.labels[$store.lang.current] + ', ' + $store.lang.t('chrome.lang_aria')"
            @click="langOpen = !langOpen"
          >
            <template x-if="$store.lang.current === 'en'">
              <svg
                class="chrome__flag"
                viewBox="0 0 60 30"
                aria-hidden="true"
                focusable="false"
              >
                <rect width="60" height="30" fill="#012169" />
                <path d="M0,0 L60,30 M60,0 L0,30" stroke="#ffffff" stroke-width="6" />
                <path d="M0,0 L60,30 M60,0 L0,30" stroke="#c8102e" stroke-width="2" />
                <path d="M30,0 V30 M0,15 H60" stroke="#ffffff" stroke-width="10" />
                <path d="M30,0 V30 M0,15 H60" stroke="#c8102e" stroke-width="6" />
              </svg>
            </template>
            <template x-if="$store.lang.current === 'sv'">
              <svg
                class="chrome__flag"
                viewBox="0 0 16 10"
                aria-hidden="true"
                focusable="false"
              >
                <rect width="16" height="10" fill="#006aa7" />
                <rect x="0" y="4" width="16" height="2" fill="#fecc00" />
                <rect x="5" y="0" width="2" height="10" fill="#fecc00" />
              </svg>
            </template>
            <span class="chrome__lang-chevron" aria-hidden="true">&#9662;</span>
          </button>
          <ul
            class="chrome__lang-menu"
            role="listbox"
            :aria-label="$store.lang.t('chrome.lang_aria')"
            x-show="langOpen"
            x-cloak
          >
            <li class="chrome__lang-item">
              <button
                type="button"
                class="chrome__lang chrome__lang-option"
                data-lang="en"
                role="option"
                :aria-selected="$store.lang.current === 'en'"
                :aria-label="$store.lang.labels.en"
                @click="$store.lang.set('en'); langOpen = false"
              >
                <svg
                  class="chrome__flag"
                  viewBox="0 0 60 30"
                  aria-hidden="true"
                  focusable="false"
                >
                  <rect width="60" height="30" fill="#012169" />
                  <path d="M0,0 L60,30 M60,0 L0,30" stroke="#ffffff" stroke-width="6" />
                  <path d="M0,0 L60,30 M60,0 L0,30" stroke="#c8102e" stroke-width="2" />
                  <path d="M30,0 V30 M0,15 H60" stroke="#ffffff" stroke-width="10" />
                  <path d="M30,0 V30 M0,15 H60" stroke="#c8102e" stroke-width="6" />
                </svg>
                <span class="chrome__lang-name" x-text="$store.lang.labels.en"></span>
              </button>
            </li>
            <li class="chrome__lang-item">
              <button
                type="button"
                class="chrome__lang chrome__lang-option"
                data-lang="sv"
                role="option"
                :aria-selected="$store.lang.current === 'sv'"
                :aria-label="$store.lang.labels.sv"
                @click="$store.lang.set('sv'); langOpen = false"
              >
                <svg
                  class="chrome__flag"
                  viewBox="0 0 16 10"
                  aria-hidden="true"
                  focusable="false"
                >
                  <rect width="16" height="10" fill="#006aa7" />
                  <rect x="0" y="4" width="16" height="2" fill="#fecc00" />
                  <rect x="5" y="0" width="2" height="10" fill="#fecc00" />
                </svg>
                <span class="chrome__lang-name" x-text="$store.lang.labels.sv"></span>
              </button>
            </li>
          </ul>
        </div>
        <button
          class="chrome__me"
          type="button"
          @click="$store.app.goMe()"
          :aria-label="$store.lang.t('chrome.me_aria')"
        >
          <svg
            class="chrome__me-icon"
            viewBox="0 0 24 24"
            aria-hidden="true"
            focusable="false"
          >
            <circle cx="12" cy="8" r="4" />
            <path d="M12 14c-4.4 0-8 2.9-8 6.5V22h16v-1.5c0-3.6-3.6-6.5-8-6.5z" />
          </svg>
        </button>
      </div>
    </header>

    <main class="view">
      <!-- Calendar view: ongoing/upcoming events plus recently-ended
           ones (21-day grace window). Filters and search. -->
      <section
        class="view__body"
        x-show="$store.app.view === 'calendar'"
        x-data="calendarView()"
      >
        <div class="filters">
          <label class="filters__search">
            <span class="sr-only" x-text="$store.lang.t('calendar.search_label')"></span>
            <input
              type="search"
              :placeholder="$store.lang.t('calendar.search_placeholder')"
              x-model.debounce.150ms="$store.filters.query"
              autocomplete="off"
            />
          </label>
          <div class="filters__row">
            <label>
              <span class="sr-only" x-text="$store.lang.t('calendar.type_label')"></span>
              <select x-model="$store.filters.type">
                <option value="" x-text="$store.lang.t('calendar.all_types')"></option>
                <template x-for="t in types" :key="t">
                  <option :value="t" x-text="t"></option>
                </template>
              </select>
            </label>
            <label>
              <span class="sr-only" x-text="$store.lang.t('calendar.category_label')"></span>
              <select x-model="$store.filters.category">
                <option value="" x-text="$store.lang.t('calendar.all_categories')"></option>
                <template x-for="c in categories" :key="c">
                  <option :value="c" x-text="c"></option>
                </template>
              </select>
            </label>
            <label>
              <span class="sr-only" x-text="$store.lang.t('calendar.month_label')"></span>
              <select x-model="$store.filters.month">
                <option value="" x-text="$store.lang.t('calendar.all_months')"></option>
                <template x-for="m in months" :key="m">
                  <option :value="m" x-text="m"></option>
                </template>
              </select>
            </label>
          </div>
        </div>

        <p
          class="hint"
          x-show="$store.catalog.loading"
          aria-live="polite"
          x-text="$store.lang.t('calendar.loading')"
        ></p>
        <p
          class="hint hint--error"
          x-show="!$store.catalog.loading && $store.catalog.error"
          role="alert"
          x-text="$store.lang.t('calendar.load_error', { error: $store.catalog.error })"
        ></p>
        <p
          class="hint"
          x-show="!$store.catalog.loading && !$store.catalog.error && filtered().length === 0"
          x-text="$store.lang.t('calendar.no_match')"
        ></p>

        <ul
          class="events"
          x-show="!$store.catalog.loading && !$store.catalog.error"
        >
          <template x-for="event in filtered()" :key="event.id">
            <li class="events__card">
              <button
                type="button"
                class="events__link"
                @click="$store.app.selectEvent(event.id)"
              >
                <template x-if="event.branding?.hero_image">
                  <img
                    class="events__image"
                    :src="event.branding.hero_image"
                    :alt="$store.lang.t('event.hero_image_alt', { name: event.name })"
                    loading="lazy"
                    decoding="async"
                  />
                </template>
                <span class="events__type" x-text="event.type"></span>
                <span class="events__name" x-text="event.name"></span>
                <span class="events__dates" x-text="formatDates(event)"></span>
                <span class="events__summary" x-text="event.summary"></span>
              </button>
            </li>
          </template>
        </ul>
      </section>

      <!-- Event view: mini-homepage scoped to the selected event. -->
      <section
        class="view__body"
        x-show="$store.app.view === 'event'"
        x-data="eventView()"
      >
        <template x-if="event()">
          <div>
            <!-- Stacked landing layout: hero plus every section, one
                 below the other. Lists truncate to INLINE_LIMIT items
                 with a "see all" link to a dedicated full-list page;
                 Practical info and Newsletter render in full inline.
                 The dedicated `#/event/<id>/<section>` routes mount
                 their own block below. -->
            <div x-show="$store.app.eventSubview === 'home'">
              <header class="event-hero">
                <template x-if="event().branding?.hero_image">
                  <figure class="event-hero__image-wrap">
                    <img
                      class="event-hero__image"
                      :src="event().branding.hero_image"
                      :alt="$store.lang.t('event.hero_image_alt', { name: event().name })"
                      loading="lazy"
                      decoding="async"
                    />
                    <figcaption
                      class="event-hero__image-credit"
                      x-show="event().branding?.hero_image_credit"
                      x-text="$store.lang.t('event.image_credit_prefix') + event().branding.hero_image_credit"
                    ></figcaption>
                  </figure>
                </template>
                <p class="event-hero__type" x-text="event().type"></p>
                <h2 class="event-hero__name" x-text="event().name"></h2>
                <p class="event-hero__dates" x-text="formatDates(event())"></p>
                <p class="event-hero__summary" x-text="event().summary"></p>
                <div
                  class="event-hero__actions"
                  x-show="event().ticket_model !== 'none'"
                >
                  <button
                    class="event-hero__cta"
                    type="button"
                    @click="startPurchase()"
                    x-text="ticketCtaLabel(event())"
                  ></button>
                  <button
                    class="event-hero__cta event-hero__cta--alt"
                    type="button"
                    x-show="hasTicket()"
                    @click="$store.app.goTickets()"
                    x-text="$store.lang.t('event.view_ticket')"
                  ></button>
                </div>
              </header>

              <div class="event-stacked">
                <!-- Event add-ons: points-only redemption section,
                     visible on the event landing view only when the
                     signed-in visitor owns a ticket for the event and
                     the catalog has active add-ons for it. See
                     docs/functional-specification.md under "Spending —
                     event add-ons". -->
                <section class="event-addons" x-show="addonsVisible()">
                  <h3 class="event-addons__title">
                    <span x-text="$store.lang.t('event.addons_title')"></span>
                    <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
                  </h3>
                  <p class="event-addons__intro" x-text="$store.lang.t('event.addons_intro')"></p>

                  <div
                    class="event-addons__banner"
                    x-show="redemption.lastRedemption"
                    role="status"
                    aria-live="polite"
                  >
                    <p class="event-addons__banner-title">
                      <span x-text="$store.lang.t('event.addons_confirmed')"></span>
                      <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
                    </p>
                    <p
                      class="event-addons__banner-body"
                      x-show="redemption.lastRedemption"
                      x-text="$store.lang.t('event.addons_confirmed_body', { name: redemption.lastRedemption?.name ?? '', cost: redemption.lastRedemption?.cost ?? 0 })"
                    ></p>
                    <button
                      type="button"
                      class="event-addons__banner-dismiss"
                      @click="redemption.dismissLastRedemption()"
                      x-text="$store.lang.t('event.addons_dismiss')"
                    ></button>
                  </div>

                  <p
                    class="auth-form__error"
                    x-show="redemption.error"
                    role="alert"
                    x-text="redemption.error"
                  ></p>

                  <ul class="event-addons__list">
                    <template x-for="addon in addons()" :key="addon.id">
                      <li class="event-addons__card">
                        <template x-if="addonImage(addon)">
                          <img
                            class="event-addons__image"
                            :src="addonImage(addon)"
                            :alt="$store.lang.t('event.addons_image_alt', { name: addon.name })"
                            loading="lazy"
                            decoding="async"
                          />
                        </template>
                        <div class="event-addons__body">
                          <p class="event-addons__name" x-text="addon.name"></p>
                          <p class="event-addons__desc" x-text="addon.description"></p>
                          <p class="event-addons__cost" x-text="$store.lang.t('event.addons_cost', { cost: addon.points_cost })"></p>
                          <p
                            class="event-addons__stock"
                            x-show="redemption.remainingStock(addon) !== null"
                            x-text="$store.lang.t('event.addons_stock', { count: redemption.remainingStock(addon) })"
                          ></p>
                          <p
                            class="event-addons__disabled-reason"
                            x-show="!redemption.canRedeem(addon) && !redemption.pending[addon.id]"
                            x-text="redemption.disabledReason(addon)"
                          ></p>
                          <button
                            type="button"
                            class="event-addons__redeem"
                            :disabled="!redemption.canRedeem(addon)"
                            @click="redemption.redeem(addon)"
                          >
                            <span x-show="!redemption.pending[addon.id]" x-text="$store.lang.t('event.addons_redeem')"></span>
                            <span x-show="redemption.pending[addon.id]" x-text="$store.lang.t('event.addons_redeeming')"></span>
                          </button>
                        </div>
                      </li>
                    </template>
                  </ul>
                </section>

                <!-- News section (truncated to INLINE_LIMIT). -->
                <section
                  class="event-section"
                  id="event-section-news"
                  x-show="news().length > 0"
                >
                  <h3 class="event-section__title" x-text="$store.lang.t('sections.news')"></h3>
                  <ul class="news-list">
                    <template x-for="item in inlineNews()" :key="item.id">
                      <li class="news-item">
                        <template x-if="newsImage(item)">
                          <img
                            class="news-item__image"
                            :src="newsImage(item)"
                            :alt="$store.lang.t('event.news_image_alt', { name: event().name })"
                            loading="lazy"
                            decoding="async"
                          />
                        </template>
                        <div class="news-item__body-wrap">
                          <p
                            class="news-item__date"
                            x-text="formatShortDate(item.published_at)"
                          ></p>
                          <h4
                            class="news-item__title"
                            x-text="item.title"
                          ></h4>
                          <p class="news-item__body" x-text="item.body"></p>
                        </div>
                      </li>
                    </template>
                  </ul>
                  <button
                    type="button"
                    class="event-section__see-all"
                    x-show="hasMoreNews()"
                    @click="$store.app.goEventSubview('news')"
                    x-text="$store.lang.t('event.see_all_news', { count: news().length })"
                  ></button>
                </section>

                <!-- Articles section (truncated). -->
                <section
                  class="event-section"
                  id="event-section-articles"
                  x-show="articles().length > 0"
                >
                  <h3 class="event-section__title" x-text="$store.lang.t('sections.articles')"></h3>
                  <ul class="articles-list">
                    <template x-for="a in inlineArticles()" :key="a.id">
                      <li class="article">
                        <template x-if="articleImage(a)">
                          <img
                            class="article__image"
                            :src="articleImage(a)"
                            :alt="$store.lang.t('event.article_image_alt', { title: a.title })"
                            loading="lazy"
                            decoding="async"
                          />
                        </template>
                        <h4 class="article__title" x-text="a.title"></h4>
                        <p class="article__body" x-text="a.body"></p>
                      </li>
                    </template>
                  </ul>
                  <button
                    type="button"
                    class="event-section__see-all"
                    x-show="hasMoreArticles()"
                    @click="$store.app.goEventSubview('articles')"
                    x-text="$store.lang.t('event.see_all_articles', { count: articles().length })"
                  ></button>
                </section>

                <!-- Program section (truncated to INLINE_LIMIT sessions
                     across days; full page keeps the by-day grouping). -->
                <section
                  class="event-section"
                  id="event-section-program"
                  x-show="programByDay().length > 0"
                >
                  <h3 class="event-section__title" x-text="$store.lang.t('sections.program')"></h3>
                  <template x-for="group in inlineProgramByDay()" :key="group.day">
                    <section class="program-day">
                      <h4
                        class="program-day__heading"
                        x-text="formatDayHeading(group.day)"
                      ></h4>
                      <ul class="program-day__list">
                        <template
                          x-for="session in group.sessions"
                          :key="session.id"
                        >
                          <li class="session">
                            <p
                              class="session__time"
                              x-text="session.start_time + '–' + session.end_time"
                            ></p>
                            <h5
                              class="session__title"
                              x-text="session.title"
                            ></h5>
                            <p
                              class="session__meta"
                              x-text="session.location + (session.track ? ' · ' + session.track : '')"
                            ></p>
                            <p
                              class="session__description"
                              x-text="session.description"
                            ></p>
                          </li>
                        </template>
                      </ul>
                    </section>
                  </template>
                  <button
                    type="button"
                    class="event-section__see-all"
                    x-show="hasMoreProgram()"
                    @click="$store.app.goEventSubview('program')"
                    x-text="$store.lang.t('event.see_all_program', { count: programSessionCount() })"
                  ></button>
                </section>

                <!-- Exhibitors section (truncated). -->
                <section
                  class="event-section"
                  id="event-section-exhibitors"
                  x-show="exhibitorsForEvent().length > 0"
                >
                  <h3 class="event-section__title" x-text="$store.lang.t('sections.exhibitors')"></h3>
                  <ul class="exhibitor-list">
                    <template x-for="e in inlineExhibitors()" :key="e.id">
                      <li class="exhibitor-card">
                        <button
                          type="button"
                          class="exhibitor-card__link"
                          @click="$store.app.selectExhibitor(e.id)"
                        >
                          <img
                            class="exhibitor-card__logo"
                            :src="exhibitorLogo(e)"
                            :alt="$store.lang.t('event.exhibitor_logo_alt', { name: e.name })"
                            loading="lazy"
                            decoding="async"
                          />
                          <span class="exhibitor-card__text">
                            <span class="exhibitor-card__name" x-text="e.name"></span>

                                name="food-timeslot"
                                :value="s.id"

                        </div>
                        <div class="purchase__summary-row" x-show="(selectedMenu()?.extras?.length ?? 0) > 0">
                          <dt x-text="$store.lang.t('food.includes_label')"></dt>
                          <dd x-text="(selectedMenu()?.extras ?? []).join(', ')"></dd>
                        </div>
                        <div class="purchase__summary-row">
                          <dt x-text="$store.lang.t('food.summary_price')"></dt>

                          <dt x-text="$store.lang.t('food.summary_delivery')"></dt>

                        </div>
                        <div class="purchase__summary-row" x-show="deliveryMode === 'timeslot' && selectedRestaurant() && selectedTimeslot()">
                          <dt x-text="$store.lang.t('food.summary_delivery')"></dt>
                          <dd>
                            <span x-text="selectedRestaurant()?.label ?? ''"></span>
                            <span> · </span>
                            <span x-text="selectedTimeslot()?.label ?? ''"></span>
                          </dd>
                        </div>
                      </dl>
                      <p class="purchase__sim-note">
                        <span x-text="$store.lang.t('purchase.sim_note_prefix')"></span>
                        <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
                        <span x-text="$store.lang.t('purchase.sim_note_suffix')"></span>
                      </p>
                    </section>
                    <p class="auth-form__error" x-show="error" x-text="error"></p>
                    <button
                      class="purchase__primary"
                      type="submit"
                      :disabled="processing"
                    >
                      <span x-show="!processing" x-text="$store.lang.t('food.confirm')"></span>
                      <span x-show="processing" x-text="$store.lang.t('food.processing')"></span>
                    </button>
                    <button
                      class="purchase__secondary"
                      type="button"
                      :disabled="processing"
                      @click="goToStep(1)"
                      x-text="$store.lang.t('food.back')"
                    ></button>

                </template>

                <template x-if="step === 3 && confirmedOrder">
                  <div class="purchase__body">
                    <h3 class="purchase__step-title">
                      <span x-text="$store.lang.t('food.confirmed')"></span>
                      <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
                    </h3>
                    <p class="purchase__ref">
                      <span x-text="$store.lang.t('food.transaction_ref')"></span>
                      <code x-text="confirmedOrder.transaction_ref"></code>
                    </p>
                    <article class="ticket-card">
                      <header class="ticket-card__header">
                        <p class="ticket-card__event" x-text="confirmedOrder.menu_label"></p>
                        <p class="ticket-card__dates" x-text="confirmedOrder.price"></p>
                      </header>
                      <p
                        class="ticket-card__extras"
                        x-show="confirmedExtras().length"
                        x-text="$store.lang.t('food.includes_label') + ': ' + confirmedExtras().join(', ')"
                      ></p>
                      <p
                        x-show="confirmedOrder.delivery_mode === 'pickup'"
                        x-text="$store.lang.t('food.pickup_instructions', { location: confirmedOrder.delivery_label })"
                      ></p>
                      <p
                        x-show="confirmedOrder.delivery_mode === 'timeslot'"
                        x-text="$store.lang.t('food.timeslot_instructions', { restaurant: confirmedOrder.delivery_label.split(' · ')[0], slot: confirmedOrder.delivery_label.split(' · ')[1] || '' })"
                      ></p>
                    </article>
                    <button
                      class="purchase__primary"
                      type="button"
                      @click="_hydrate()"
                      x-text="$store.lang.t('food.order_another')"
                    ></button>
                    <button
                      class="purchase__secondary"
                      type="button"
                      @click="$store.app.goEventSubview('home')"
                      x-text="$store.lang.t('food.back_to_event')"
                    ></button>

                </template>
              </div>
            </template>
          </div>
        </template>

        <p
          class="hint"
          x-show="!event()"
          x-text="$store.lang.t('event.not_found')"
        ></p>

      <!-- Auth view: register, sign-in, and simulated social providers.
           Email registration calls supabase.auth.signUp; simulated
           Google / Microsoft buttons call supabase.auth.signInAnonymously
           and stamp the resulting session with a provider label. -->
      <section
        class="view__body"
        x-show="$store.app.view === 'auth'"
        x-data="authView()"
      >
        <div class="auth-card">
          <div
            class="auth-tabs"
            role="tablist"
            :aria-label="$store.lang.t('auth.mode_tablist_aria')"
          >
            <button
              type="button"
              role="tab"
              class="auth-tabs__tab"
              :class="mode === 'signin' && 'auth-tabs__tab--active'"
              :aria-selected="mode === 'signin'"
              @click="setMode('signin')"
              x-text="$store.lang.t('auth.tab_signin')"
            ></button>
            <button
              type="button"
              role="tab"
              class="auth-tabs__tab"
              :class="mode === 'register' && 'auth-tabs__tab--active'"
              :aria-selected="mode === 'register'"
              @click="setMode('register')"
              x-text="$store.lang.t('auth.tab_register')"
            ></button>
          </div>

          <form class="auth-form" @submit.prevent="submit()">
            <label class="auth-form__field">
              <span class="auth-form__label" x-text="$store.lang.t('auth.email')"></span>
              <input
                type="email"
                autocomplete="email"
                required
                x-model="email"
              />
            </label>
            <label class="auth-form__field" x-show="mode === 'register'">
              <span class="auth-form__label" x-text="$store.lang.t('auth.display_name')"></span>
              <input
                type="text"
                autocomplete="name"
                x-model="displayName"
              />
            </label>
            <label class="auth-form__field">
              <span class="auth-form__label" x-text="$store.lang.t('auth.password')"></span>
              <input
                type="password"
                autocomplete="current-password"
                required
                x-model="password"
              />
            </label>
            <p class="auth-form__error" x-show="error" x-text="error"></p>
            <button
              type="submit"
              class="auth-form__submit"
              :disabled="processing"
            >
              <span x-show="!processing && mode === 'signin'" x-text="$store.lang.t('auth.submit_signin')"></span>
              <span x-show="!processing && mode === 'register'" x-text="$store.lang.t('auth.submit_register')"></span>
              <span x-show="processing" x-text="$store.lang.t('auth.working')"></span>
            </button>
          </form>

          <div class="auth-divider" aria-hidden="true">
            <span x-text="$store.lang.t('auth.or')"></span>
          </div>

          <div class="auth-social">
            <button
              type="button"
              class="auth-social__button"
              :disabled="processing"
              @click="socialSignIn('google')"
            >
              <span x-text="$store.lang.t('auth.continue_google')"></span>
              <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
            </button>
            <button
              type="button"
              class="auth-social__button"
              :disabled="processing"
              @click="socialSignIn('microsoft')"
            >
              <span x-text="$store.lang.t('auth.continue_microsoft')"></span>
              <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
            </button>
          </div>
        </div>
      </section>

      <!-- My Pages view: visible when a user is signed in. Visitors who
           arrive at #/me without a session are nudged to the auth view. -->
      <section
        class="view__body"
        x-show="$store.app.view === 'me'"
        x-data="meView()"
      >
        <template x-if="user()">
          <div class="me">
            <header class="me__header">
              <p class="me__name" x-text="user().display_name"></p>
              <p class="me__email" x-text="user().email"></p>
              <p class="me__provider">
                <span x-text="$store.lang.t('me.signed_in_with')"></span>
                <span x-text="providerLabel(user().auth_provider)"></span>
                <span
                  class="sim-chip"
                  x-show="isSimulated()"
                  x-text="$store.lang.t('sim.chip')"
                ></span>
              </p>
            </header>
            <ul class="me__links">
              <li>
                <button type="button" class="me__link" @click="openTickets()">
                  <span x-text="$store.lang.t('me.my_tickets_link')"></span>
                  <span class="me__link-hint" x-text="ticketCountHint()"></span>
                </button>
              </li>
            </ul>

            <section class="me__section me__section--points">
              <h2 class="me__section-title">
                <span x-text="$store.lang.t('points.section_title')"></span>
                <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
              </h2>
              <p
                class="placeholder placeholder--error"
                x-show="pointsError()"
                role="alert"
                x-text="$store.lang.t('points.load_error', { error: pointsError() })"
              ></p>
              <template x-if="!pointsError()">
                <div class="points">
                  <div class="points__balance">
                    <span class="points__balance-label" x-text="$store.lang.t('points.balance_label')"></span>
                    <span class="points__balance-value" x-text="pointsBalanceLabel()"></span>
                  </div>
                  <p class="points__blurb" x-text="$store.lang.t('points.earn_blurb')"></p>
                  <button
                    type="button"
                    class="me__link points__shop-link"
                    @click="openPointsShop()"
                    x-text="$store.lang.t('points.shop_link')"
                  ></button>
                  <h3 class="points__recent-title" x-text="$store.lang.t('points.recent_title')"></h3>
                  <p
                    class="placeholder points__empty"
                    x-show="recentTransactions().length === 0"
                    x-text="$store.lang.t('points.empty')"
                  ></p>
                  <ul
                    class="points__list"
                    x-show="recentTransactions().length > 0"
                  >
                    <template x-for="tx in recentTransactions()" :key="tx.id">
                      <li class="points__item">
                        <span class="points__item-source" x-text="transactionSourceLabel(tx.source)"></span>
                        <span class="points__item-event" x-text="transactionEventLabel(tx.event_id)"></span>
                        <span
                          class="points__item-delta"
                          :class="tx.delta >= 0 ? 'points__item-delta--positive' : 'points__item-delta--negative'"
                          x-text="transactionDeltaLabel(tx.delta)"
                        ></span>
                      </li>
                    </template>
                  </ul>
                </div>
              </template>
            </section>

            <section class="me__section" x-data="newsletterPreferences()">
              <h2 class="me__section-title" x-text="$store.lang.t('newsletter.prefs_title')"></h2>
              <p
                class="placeholder placeholder--error"
                x-show="$store.newsletter.error"
                role="alert"
                x-text="$store.lang.t('newsletter.prefs_load_error', { error: $store.newsletter.error })"
              ></p>
              <p
                class="placeholder"
                x-show="!$store.newsletter.error && subscriptions().length === 0 && !venueWide()"
                x-text="$store.lang.t('newsletter.prefs_empty')"
              ></p>

              <label class="newsletter-prefs__venue-row">
                <span class="newsletter-prefs__venue-label">
                  <span x-text="$store.lang.t('newsletter.venue_wide')"></span>
                  <span class="newsletter-prefs__venue-hint" x-text="$store.lang.t('newsletter.venue_wide_hint')"></span>
                </span>
                <input
                  type="checkbox"
                  :checked="!!venueWide()"
                  @change="toggleVenueWide()"
                />
              </label>

              <ul
                class="newsletter-prefs__list"
                x-show="subscriptions().length > 0"
              >
                <template x-for="sub in subscriptions()" :key="sub.id">
                  <li class="newsletter-prefs__item">
                    <div class="newsletter-prefs__header">
                      <p
                        class="newsletter-prefs__event"
                        x-text="sub.event_name"
                      ></p>
                      <button
                        type="button"
                        class="newsletter-prefs__unsubscribe"
                        @click="unsubscribe(sub.id)"
                        x-text="$store.lang.t('newsletter.unsubscribe')"
                      ></button>
                    </div>
                    <ul class="newsletter-prefs__topics">
                      <template x-for="topic in topics" :key="topic.key">
                        <li class="newsletter-prefs__topic">
                          <label>
                            <input
                              type="checkbox"
                              :checked="sub.preferences[topic.key]"
                              @change="togglePreference(sub, topic.key)"
                            />
                            <span x-text="topic.label"></span>
                          </label>
                        </li>
                      </template>
                    </ul>
                  </li>
                </template>
              </ul>
            </section>

            <button
              type="button"
              class="me__signout"
              @click="signOut()"
              x-text="$store.lang.t('me.signout')"
            ></button>
          </div>
        </template>
        <template x-if="!user()">
          <div class="me me--signed-out">
            <p class="placeholder" x-text="$store.lang.t('me.signed_out_hint')"></p>
            <button
              type="button"
              class="auth-form__submit"
              @click="$store.app.goAuth({ view: 'me' })"
              x-text="$store.lang.t('me.signin_or_register')"
            ></button>
          </div>
        </template>
      </section>

      <!-- Purchase view: four-step simulated ticket flow scoped to one
           event (pick type, questionnaire, attendee details, confirm).
           A visitor who lands here while signed out is routed through
           the auth view and returned afterwards. -->
      <section
        class="view__body"
        x-show="$store.app.view === 'purchase'"
        x-data="purchaseView()"
      >
        <template x-if="event()">
          <div class="purchase">
            <header class="purchase__header">
              <p class="purchase__event" x-text="event().name"></p>
              <p class="purchase__dates" x-text="formatDates(event())"></p>
            </header>

            <ol
              class="purchase__steps"
              :aria-label="$store.lang.t('purchase.steps_aria')"
            >
              <li
                :class="step >= 1 && 'purchase__step--active'"
                x-text="$store.lang.t('purchase.step_ticket')"
              ></li>
              <li
                :class="step >= 2 && 'purchase__step--active'"
                x-text="$store.lang.t('purchase.step_questionnaire')"
              ></li>
              <li
                :class="step >= 3 && 'purchase__step--active'"
                x-text="$store.lang.t('purchase.step_details')"
              ></li>
              <li
                :class="step >= 4 && 'purchase__step--active'"
                x-text="$store.lang.t('purchase.step_confirm')"
              ></li>
            </ol>

            <template x-if="step === 1">
              <div class="purchase__body">
                <h3 class="purchase__step-title" x-text="$store.lang.t('purchase.pick_ticket')"></h3>
                <ul class="ticket-types">
                  <template x-for="t in ticketTypes()" :key="t.id">
                    <li>
                      <button
                        type="button"
                        class="ticket-type"
                        :class="ticketTypeId === t.id && 'ticket-type--selected'"
                        :aria-pressed="ticketTypeId === t.id"
                        @click="ticketTypeId = t.id"
                      >
                        <span class="ticket-type__name" x-text="t.label"></span>
                        <span
                          class="ticket-type__desc"
                          x-text="t.description"
                        ></span>
                        <span
                          class="ticket-type__price"
                          x-text="t.price"
                        ></span>
                      </button>
                    </li>
                  </template>
                </ul>
                <p class="auth-form__error" x-show="error" x-text="error"></p>
                <button
                  class="purchase__primary"
                  type="button"
                  :disabled="!ticketTypeId"
                  @click="continueToQuestionnaire()"
                  x-text="$store.lang.t('purchase.continue')"
                ></button>
              </div>
            </template>

            <template x-if="step === 2">
              <form class="purchase__body" @submit.prevent="continueToDetails()">
                <h3 class="purchase__step-title" x-text="$store.lang.t('purchase.questionnaire_title')"></h3>
                <p class="purchase__questionnaire-intro" x-text="$store.lang.t('purchase.questionnaire_intro')"></p>

                <fieldset class="questionnaire__field">
                  <legend class="auth-form__label">
                    <span x-text="$store.lang.t('purchase.q_visit_type')"></span>
                    <span class="questionnaire__required" x-text="$store.lang.t('purchase.q_required')"></span>
                  </legend>
                  <label class="questionnaire__radio">
                    <input
                      type="radio"
                      name="q-visit-type"
                      value="professional"
                      :checked="questionnaire.profile.visit_type === 'professional'"
                      @change="questionnaire.profile.visit_type = 'professional'"
                    />
                    <span x-text="$store.lang.t('purchase.q_visit_professional')"></span>
                  </label>
                  <label class="questionnaire__radio">
                    <input
                      type="radio"
                      name="q-visit-type"
                      value="private"
                      :checked="questionnaire.profile.visit_type === 'private'"
                      @change="questionnaire.profile.visit_type = 'private'"
                    />
                    <span x-text="$store.lang.t('purchase.q_visit_private')"></span>
                  </label>
                </fieldset>

                <label class="auth-form__field questionnaire__field" x-show="isProfessional()">
                  <span class="auth-form__label" x-text="$store.lang.t('purchase.q_company')"></span>
                  <input
                    type="text"
                    autocomplete="organization"
                    x-model="questionnaire.profile.company"
                  />
                </label>
                <label class="auth-form__field questionnaire__field" x-show="isProfessional()">
                  <span class="auth-form__label" x-text="$store.lang.t('purchase.q_role')"></span>
                  <input
                    type="text"
                    autocomplete="organization-title"
                    x-model="questionnaire.profile.role"
                  />
                </label>

                <label class="auth-form__field questionnaire__field">
                  <span class="auth-form__label" x-text="$store.lang.t('purchase.q_gender')"></span>
                  <select x-model="questionnaire.profile.gender">
                    <option value="" x-text="$store.lang.t('purchase.q_choose')"></option>
                    <option value="female" x-text="$store.lang.t('purchase.q_gender_female')"></option>
                    <option value="male" x-text="$store.lang.t('purchase.q_gender_male')"></option>
                    <option value="non_binary" x-text="$store.lang.t('purchase.q_gender_non_binary')"></option>
                    <option value="prefer_not_to_say" x-text="$store.lang.t('purchase.q_gender_prefer_not')"></option>
                  </select>
                </label>
                <label class="auth-form__field questionnaire__field">
                  <span class="auth-form__label" x-text="$store.lang.t('purchase.q_country')"></span>
                  <input
                    type="text"
                    autocomplete="country-name"
                    x-model="questionnaire.profile.country"
                  />
                </label>
                <label class="auth-form__field questionnaire__field">
                  <span class="auth-form__label" x-text="$store.lang.t('purchase.q_region')"></span>
                  <input
                    type="text"
                    autocomplete="address-level1"
                    x-model="questionnaire.profile.region"
                  />
                </label>

                <fieldset class="questionnaire__field" x-show="hasSubjects()">
                  <legend class="auth-form__label" x-text="$store.lang.t('purchase.q_subjects')"></legend>
                  <p class="purchase__questionnaire-intro" x-text="$store.lang.t('purchase.q_subjects_hint')"></p>
                  <template x-for="subject in subjects()" :key="subject">
                    <label class="questionnaire__checkbox">
                      <input
                        type="checkbox"
                        :value="subject"
                        :checked="isSubjectSelected(subject)"
                        @change="toggleSubject(subject)"
                      />
                      <span x-text="subject"></span>
                    </label>
                  </template>
                </fieldset>

                <p class="auth-form__error" x-show="error" x-text="error"></p>
                <button
                  class="purchase__primary"
                  type="submit"
                  x-text="$store.lang.t('purchase.continue')"
                ></button>
                <button
                  class="purchase__secondary"
                  type="button"
                  @click="goToStep(1)"
                  x-text="$store.lang.t('purchase.back')"
                ></button>
              </form>
            </template>

            <template x-if="step === 3">
              <form class="purchase__body" @submit.prevent="confirm()">
                <h3 class="purchase__step-title" x-text="$store.lang.t('purchase.attendee_details')"></h3>
                <label class="auth-form__field">
                  <span class="auth-form__label" x-text="$store.lang.t('purchase.attendee_name')"></span>
                  <input
                    type="text"
                    autocomplete="name"
                    required
                    x-model="attendeeName"
                  />
                </label>
                <label class="auth-form__field">
                  <span class="auth-form__label" x-text="$store.lang.t('purchase.attendee_email')"></span>
                  <input
                    type="email"
                    autocomplete="email"
                    required
                    x-model="attendeeEmail"
                  />
                </label>
                <section class="purchase__summary">
                  <h4 class="purchase__summary-title" x-text="$store.lang.t('purchase.summary_title')"></h4>
                  <dl class="purchase__summary-list">
                    <div class="purchase__summary-row">
                      <dt x-text="$store.lang.t('purchase.summary_event')"></dt>
                      <dd x-text="event().name"></dd>
                    </div>
                    <div class="purchase__summary-row">
                      <dt x-text="$store.lang.t('purchase.summary_dates')"></dt>
                      <dd x-text="formatDates(event())"></dd>
                    </div>
                    <div class="purchase__summary-row">
                      <dt x-text="$store.lang.t('purchase.summary_ticket')"></dt>
                      <dd x-text="selectedTicketType()?.label ?? ''"></dd>
                    </div>
                    <div class="purchase__summary-row">
                      <dt x-text="$store.lang.t('purchase.summary_price')"></dt>
                      <dd x-text="selectedTicketType()?.price ?? ''"></dd>
                    </div>
                  </dl>
                  <p class="purchase__sim-note">
                    <span x-text="$store.lang.t('purchase.sim_note_prefix')"></span>
                    <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
                    <span x-text="$store.lang.t('purchase.sim_note_suffix')"></span>
                  </p>
                </section>
                <p class="auth-form__error" x-show="error" x-text="error"></p>
                <button
                  class="purchase__primary"
                  type="submit"
                  :disabled="processing"
                >
                  <span x-show="!processing" x-text="$store.lang.t('purchase.confirm')"></span>
                  <span x-show="processing" x-text="$store.lang.t('purchase.processing')"></span>
                </button>
                <button
                  class="purchase__secondary"
                  type="button"
                  :disabled="processing"
                  @click="goToStep(2)"
                  x-text="$store.lang.t('purchase.back')"
                ></button>
              </form>
            </template>

            <template x-if="step === 4 && confirmedTicket">
              <div class="purchase__body">
                <h3 class="purchase__step-title">
                  <span x-text="$store.lang.t('purchase.ticket_confirmed')"></span>
                  <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
                </h3>
                <p class="purchase__ref">
                  <span x-text="$store.lang.t('purchase.transaction_ref')"></span>
                  <code x-text="confirmedTicket.transaction_ref"></code>
                </p>
                <article class="ticket-card">
                  <header class="ticket-card__header">
                    <p class="ticket-card__event" x-text="event().name"></p>
                    <p
                      class="ticket-card__dates"
                      x-text="formatDates(event())"
                    ></p>
                  </header>
                  <div
                    class="ticket-card__qr"
                    x-html="qrSvgFor(confirmedTicket)"
                  ></div>
                  <dl class="ticket-card__meta">
                    <div class="ticket-card__meta-row">
                      <dt x-text="$store.lang.t('purchase.ticket_field_ticket')"></dt>
                      <dd x-text="confirmedTicket.ticket_type_label"></dd>
                    </div>
                    <div class="ticket-card__meta-row">
                      <dt x-text="$store.lang.t('purchase.ticket_field_attendee')"></dt>
                      <dd x-text="confirmedTicket.attendee_name"></dd>
                    </div>
                  </dl>
                </article>
                <button
                  class="purchase__primary"
                  type="button"
                  @click="$store.app.goTickets()"
                  x-text="$store.lang.t('purchase.view_in_my_tickets')"
                ></button>
                <button
                  class="purchase__secondary"
                  type="button"
                  @click="$store.app.selectEvent(event().id)"
                  x-text="$store.lang.t('purchase.back_to_event')"
                ></button>
              </div>
            </template>
          </div>
        </template>
        <p
          class="hint"
          x-show="!event()"
          x-text="$store.lang.t('event.not_found')"
        ></p>
      </section>

      <!-- My Tickets view: list of purchased tickets for the signed-in
           user, each with a locally generated QR presentation. -->
      <section
        class="view__body"
        x-show="$store.app.view === 'tickets'"
        x-data="myTicketsView()"
      >
        <template x-if="!$store.session.isSignedIn">
          <div class="me me--signed-out">
            <p class="placeholder" x-text="$store.lang.t('tickets.signed_out_hint')"></p>
            <button
              type="button"
              class="auth-form__submit"
              @click="$store.app.goAuth({ view: 'tickets' })"
              x-text="$store.lang.t('me.signin_or_register')"
            ></button>
          </div>
        </template>
        <template x-if="$store.session.isSignedIn">
          <div class="tickets">
            <p
              class="placeholder placeholder--error"
              x-show="$store.tickets.error"
              role="alert"
              x-text="$store.lang.t('tickets.load_error', { error: $store.tickets.error })"
            ></p>
            <p
              class="placeholder"
              x-show="!$store.tickets.error && tickets().length === 0"
              x-text="$store.lang.t('tickets.empty')"
            ></p>
            <ul class="tickets__list" x-show="!$store.tickets.error && tickets().length > 0">
              <template x-for="ticket in tickets()" :key="ticket.id">
                <li>
                  <article class="ticket-card">
                    <header class="ticket-card__header">
                      <p
                        class="ticket-card__event"
                        x-text="eventName(ticket)"
                      ></p>
                      <p
                        class="ticket-card__dates"
                        x-text="eventForTicket(ticket) ? formatDates(eventForTicket(ticket)) : ''"
                      ></p>
                    </header>
                    <div
                      class="ticket-card__qr"
                      x-html="qrSvgFor(ticket)"
                    ></div>
                    <dl class="ticket-card__meta">
                      <div class="ticket-card__meta-row">
                        <dt x-text="$store.lang.t('tickets.field_ticket')"></dt>
                        <dd x-text="ticket.ticket_type_label"></dd>
                      </div>
                      <div class="ticket-card__meta-row">
                        <dt x-text="$store.lang.t('tickets.field_attendee')"></dt>
                        <dd x-text="ticket.attendee_name"></dd>
                      </div>
                      <div class="ticket-card__meta-row">
                        <dt x-text="$store.lang.t('tickets.field_email')"></dt>
                        <dd x-text="ticket.attendee_email"></dd>
                      </div>
                      <div class="ticket-card__meta-row">
                        <dt x-text="$store.lang.t('tickets.field_purchased')"></dt>
                        <dd
                          x-text="formatShortDate(ticket.purchased_at)"
                        ></dd>
                      </div>
                    </dl>
                    <p class="ticket-card__sim">
                      <span x-text="$store.lang.t('tickets.sim_entry_prefix')"></span>
                      <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
                      <span x-text="$store.lang.t('tickets.sim_entry_suffix')"></span>
                    </p>
                  </article>
                </li>
              </template>
            </ul>
          </div>
        </template>
      </section>

      <!-- Points shop view: venue-wide Stockholmsmassan merchandise
           reachable at #/points. Signed-out visitors are routed through
           the auth view and returned afterwards, matching the purchase
           and food flows. -->
      <section
        class="view__body"
        x-show="$store.app.view === 'points'"
        x-data="pointsShopView()"
      >
        <template x-if="!$store.session.isSignedIn">
          <div class="me me--signed-out">
            <p class="placeholder" x-text="$store.lang.t('shop.signed_out_hint')"></p>
            <button
              type="button"
              class="auth-form__submit"
              @click="$store.app.goAuth({ view: 'points' })"
              x-text="$store.lang.t('me.signin_or_register')"
            ></button>
          </div>
        </template>
        <template x-if="$store.session.isSignedIn">
          <section class="points-shop">
            <header class="points-shop__header">
              <h2 class="points-shop__title">
                <span x-text="$store.lang.t('shop.title')"></span>
                <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
              </h2>
              <p class="points-shop__intro" x-text="$store.lang.t('shop.intro')"></p>
              <p class="points-shop__balance">
                <span class="points-shop__balance-label" x-text="$store.lang.t('points.balance_label')"></span>
                <span class="points-shop__balance-value" x-text="balanceLabel()"></span>
              </p>
            </header>

            <div
              class="event-addons__banner points-shop__banner"
              x-show="redemption.lastRedemption"
              role="status"
              aria-live="polite"
            >
              <p class="event-addons__banner-title">
                <span x-text="$store.lang.t('shop.confirmed')"></span>
                <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
              </p>
              <p
                class="event-addons__banner-body"
                x-show="redemption.lastRedemption"
                x-text="$store.lang.t('shop.confirmed_body', { name: redemption.lastRedemption?.name ?? '', cost: redemption.lastRedemption?.cost ?? 0 })"
              ></p>
              <button
                type="button"
                class="event-addons__banner-dismiss"
                @click="redemption.dismissLastRedemption()"
                x-text="$store.lang.t('shop.dismiss')"
              ></button>
            </div>

            <p
              class="auth-form__error"
              x-show="redemption.error"
              role="alert"
              x-text="redemption.error"
            ></p>

            <p
              class="placeholder"
              x-show="items().length === 0"
              x-text="$store.lang.t('shop.empty')"
            ></p>

            <ul class="event-addons__list points-shop__list" x-show="items().length > 0">
              <template x-for="item in items()" :key="item.id">
                <li class="event-addons__card points-shop__card">
                  <template x-if="merchImage(item)">
                    <img
                      class="event-addons__image"
                      :src="merchImage(item)"
                      :alt="$store.lang.t('shop.image_alt', { name: item.name })"
                      loading="lazy"
                      decoding="async"
                    />
                  </template>
                  <div class="event-addons__body">
                    <p class="event-addons__name" x-text="item.name"></p>
                    <p class="event-addons__desc" x-text="item.description"></p>
                    <p class="event-addons__cost" x-text="$store.lang.t('event.addons_cost', { cost: item.points_cost })"></p>
                    <p
                      class="event-addons__stock"
                      x-show="redemption.remainingStock(item) !== null"
                      x-text="$store.lang.t('event.addons_stock', { count: redemption.remainingStock(item) })"
                    ></p>
                    <p
                      class="event-addons__disabled-reason"
                      x-show="!redemption.canRedeem(item) && !redemption.pending[item.id]"
                      x-text="redemption.disabledReason(item)"
                    ></p>
                    <button
                      type="button"
                      class="event-addons__redeem points-shop__redeem"
                      :disabled="!redemption.canRedeem(item)"
                      @click="redemption.redeem(item)"
                    >
                      <span x-show="!redemption.pending[item.id]" x-text="$store.lang.t('event.addons_redeem')"></span>
                      <span x-show="redemption.pending[item.id]" x-text="$store.lang.t('event.addons_redeeming')"></span>
                    </button>
                  </div>
                </li>
              </template>
            </ul>
          </section>
        </template>
      </section>
    </main>
  </body>
</html>
