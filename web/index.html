<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#002e77" />
    <title>MassanApp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="assets/css/app.css" />
    <script src="assets/env.js"></script>
    <script src="assets/env.local.js" onerror="void 0"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2.45.4/dist/umd/supabase.js"></script>
    <!-- app.js is an ES module entrypoint that imports every Alpine
         store and view factory and registers them on alpine:init. It
         must be parsed before the Alpine CDN build, which dispatches
         alpine:init via a microtask at the end of its own execution.
         Module scripts are deferred by default. -->
    <script type="module" src="assets/js/app.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  </head>
  <body x-data x-cloak>
    <!-- Simulated-mode banner so reviewers see this is a prototype. -->
    <div
      class="sim-banner"
      x-show="$store.app.isSimulated"
      x-text="$store.lang.t('sim.banner')"
    ></div>

    <!-- Top chrome. "Back to events" appears only when an event is selected,
         per the one-event-at-a-time navigation rule. The right-hand
         cluster holds the language toggle and the "Me" link. -->
    <header class="chrome">
      <button
        class="chrome__back"
        type="button"
        x-show="$store.app.view !== 'calendar'"
        @click="$store.app.goCalendar()"
        :aria-label="$store.lang.t('chrome.back_events_aria')"
      >
        <span aria-hidden="true">&larr;</span>
        <span x-text="$store.lang.t('chrome.events')"></span>
      </button>
      <h1 class="chrome__title" x-text="$store.app.chromeTitle()"></h1>
      <div class="chrome__actions">
        <button
          class="chrome__lang"
          type="button"
          @click="$store.lang.toggle()"
          :aria-label="$store.lang.t('chrome.lang_aria')"
          x-text="$store.lang.current === 'en' ? 'SV' : 'EN'"
        ></button>
        <button
          class="chrome__me"
          type="button"
          @click="$store.app.goMe()"
          :aria-label="$store.lang.t('chrome.me_aria')"
          x-text="$store.lang.t('chrome.me')"
        ></button>
      </div>
    </header>

    <main class="view">
      <!-- Calendar view: upcoming events with filters and search. -->
      <section
        class="view__body"
        x-show="$store.app.view === 'calendar'"
        x-data="calendarView()"
      >
        <div class="filters">
          <label class="filters__search">
            <span class="sr-only" x-text="$store.lang.t('calendar.search_label')"></span>
            <input
              type="search"
              :placeholder="$store.lang.t('calendar.search_placeholder')"
              x-model.debounce.150ms="$store.filters.query"
              autocomplete="off"
            />
          </label>
          <div class="filters__row">
            <label>
              <span class="sr-only" x-text="$store.lang.t('calendar.type_label')"></span>
              <select x-model="$store.filters.type">
                <option value="" x-text="$store.lang.t('calendar.all_types')"></option>
                <template x-for="t in types" :key="t">
                  <option :value="t" x-text="t"></option>
                </template>
              </select>
            </label>
            <label>
              <span class="sr-only" x-text="$store.lang.t('calendar.category_label')"></span>
              <select x-model="$store.filters.category">
                <option value="" x-text="$store.lang.t('calendar.all_categories')"></option>
                <template x-for="c in categories" :key="c">
                  <option :value="c" x-text="c"></option>
                </template>
              </select>
            </label>
            <label>
              <span class="sr-only" x-text="$store.lang.t('calendar.month_label')"></span>
              <select x-model="$store.filters.month">
                <option value="" x-text="$store.lang.t('calendar.all_months')"></option>
                <template x-for="m in months" :key="m">
                  <option :value="m" x-text="m"></option>
                </template>
              </select>
            </label>
          </div>
        </div>

        <p
          class="hint"
          x-show="$store.catalog.loading"
          aria-live="polite"
          x-text="$store.lang.t('calendar.loading')"
        ></p>
        <p
          class="hint hint--error"
          x-show="!$store.catalog.loading && $store.catalog.error"
          role="alert"
          x-text="$store.lang.t('calendar.load_error', { error: $store.catalog.error })"
        ></p>
        <p
          class="hint"
          x-show="!$store.catalog.loading && !$store.catalog.error && filtered().length === 0"
          x-text="$store.lang.t('calendar.no_match')"
        ></p>

        <ul
          class="events"
          x-show="!$store.catalog.loading && !$store.catalog.error"
        >
          <template x-for="event in filtered()" :key="event.id">
            <li class="events__card">
              <button
                type="button"
                class="events__link"
                @click="$store.app.selectEvent(event.id)"
              >
                <template x-if="event.branding?.hero_image">
                  <img
                    class="events__image"
                    :src="event.branding.hero_image"
                    :alt="$store.lang.t('event.hero_image_alt', { name: event.name })"
                    loading="lazy"
                    decoding="async"
                  />
                </template>
                <span class="events__type" x-text="event.type"></span>
                <span class="events__name" x-text="event.name"></span>
                <span class="events__dates" x-text="formatDates(event)"></span>
                <span class="events__summary" x-text="event.summary"></span>
              </button>
            </li>
          </template>
        </ul>
      </section>

      <!-- Event view: mini-homepage scoped to the selected event. -->
      <section
        class="view__body"
        x-show="$store.app.view === 'event'"
        x-data="eventView()"
      >
        <template x-if="event()">
          <div>
            <header class="event-hero">
              <template x-if="event().branding?.hero_image">
                <figure class="event-hero__image-wrap">
                  <img
                    class="event-hero__image"
                    :src="event().branding.hero_image"
                    :alt="$store.lang.t('event.hero_image_alt', { name: event().name })"
                    loading="lazy"
                    decoding="async"
                  />
                  <figcaption
                    class="event-hero__image-credit"
                    x-show="event().branding?.hero_image_credit"
                    x-text="$store.lang.t('event.image_credit_prefix') + event().branding.hero_image_credit"
                  ></figcaption>
                </figure>
              </template>
              <p class="event-hero__type" x-text="event().type"></p>
              <h2 class="event-hero__name" x-text="event().name"></h2>
              <p class="event-hero__dates" x-text="formatDates(event())"></p>
              <p class="event-hero__summary" x-text="event().summary"></p>
              <div
                class="event-hero__actions"
                x-show="event().ticket_model !== 'none'"
              >
                <button
                  class="event-hero__cta"
                  type="button"
                  @click="startPurchase()"
                  x-text="ticketCtaLabel(event())"
                ></button>
                <button
                  class="event-hero__cta event-hero__cta--alt"
                  type="button"
                  x-show="hasTicket()"
                  @click="$store.app.goTickets()"
                  x-text="$store.lang.t('event.view_ticket')"
                ></button>
              </div>
            </header>

            <nav class="event-nav" aria-label="Event sections">
              <template x-for="section in sections" :key="section.id">
                <button
                  type="button"
                  class="event-nav__tab"
                  :class="$store.app.eventSubview === section.id && 'event-nav__tab--active'"
                  @click="$store.app.goEventSubview(section.id)"
                  x-text="section.label"
                ></button>
              </template>
            </nav>

            <div class="event-subview">
              <template x-if="$store.app.eventSubview === 'home'">
                <p class="placeholder" x-text="$store.lang.t('event.pick_section')"></p>
              </template>

              <template x-if="$store.app.eventSubview === 'news'">
                <div>
                  <p
                    class="placeholder"
                    x-show="news().length === 0"
                    x-text="$store.lang.t('event.no_news')"
                  ></p>
                  <ul class="news-list" x-show="news().length > 0">
                    <template x-for="item in news()" :key="item.id">
                      <li class="news-item">
                        <p
                          class="news-item__date"
                          x-text="formatShortDate(item.published_at)"
                        ></p>
                        <h3
                          class="news-item__title"
                          x-text="item.title"
                        ></h3>
                        <p class="news-item__body" x-text="item.body"></p>
                      </li>
                    </template>
                  </ul>
                </div>
              </template>

              <template x-if="$store.app.eventSubview === 'articles'">
                <div>
                  <p
                    class="placeholder"
                    x-show="articles().length === 0"
                    x-text="$store.lang.t('event.no_articles')"
                  ></p>
                  <ul class="articles-list" x-show="articles().length > 0">
                    <template x-for="a in articles()" :key="a.id">
                      <li class="article">
                        <h3 class="article__title" x-text="a.title"></h3>
                        <p class="article__body" x-text="a.body"></p>
                      </li>
                    </template>
                  </ul>
                </div>
              </template>

              <template x-if="$store.app.eventSubview === 'program'">
                <div>
                  <p
                    class="placeholder"
                    x-show="programByDay().length === 0"
                    x-text="$store.lang.t('event.no_program')"
                  ></p>
                  <template x-for="group in programByDay()" :key="group.day">
                    <section class="program-day">
                      <h3
                        class="program-day__heading"
                        x-text="formatDayHeading(group.day)"
                      ></h3>
                      <ul class="program-day__list">
                        <template
                          x-for="session in group.sessions"
                          :key="session.id"
                        >
                          <li class="session">
                            <p
                              class="session__time"
                              x-text="session.start_time + '–' + session.end_time"
                            ></p>
                            <h4
                              class="session__title"
                              x-text="session.title"
                            ></h4>
                            <p
                              class="session__meta"
                              x-text="session.location + (session.track ? ' · ' + session.track : '')"
                            ></p>
                            <p
                              class="session__speakers"
                              x-show="speakerNames(session).length > 0"
                              x-text="$store.lang.t('event.speakers_prefix') + speakerNames(session).join(', ')"
                            ></p>
                            <p
                              class="session__description"
                              x-text="session.description"
                            ></p>
                          </li>
                        </template>
                      </ul>
                    </section>
                  </template>
                </div>
              </template>

              <template
                x-if="$store.app.eventSubview === 'exhibitors' && !$store.app.exhibitorId"
              >
                <div>
                  <label class="filters__search">
                    <span
                      class="sr-only"
                      x-text="$store.lang.t('event.search_exhibitors_label')"
                    ></span>
                    <input
                      type="search"
                      :placeholder="$store.lang.t('event.search_exhibitors_placeholder')"
                      x-model.debounce.150ms="exhibitorQuery"
                      autocomplete="off"
                    />
                  </label>
                  <p
                    class="placeholder"
                    x-show="filteredExhibitors().length === 0"
                    x-text="$store.lang.t('event.no_exhibitor_match')"
                  ></p>
                  <ul
                    class="exhibitor-list"
                    x-show="filteredExhibitors().length > 0"
                  >
                    <template
                      x-for="e in filteredExhibitors()"
                      :key="e.id"
                    >
                      <li class="exhibitor-card">
                        <button
                          type="button"
                          class="exhibitor-card__link"
                          @click="$store.app.selectExhibitor(e.id)"
                        >
                          <span
                            class="exhibitor-card__name"
                            x-text="e.name"
                          ></span>
                          <span
                            class="exhibitor-card__booth"
                            x-text="$store.lang.t('event.booth_prefix') + e.booth"
                          ></span>
                          <span
                            class="exhibitor-card__desc"
                            x-text="e.description"
                          ></span>
                        </button>
                      </li>
                    </template>
                  </ul>
                </div>
              </template>

              <template
                x-if="$store.app.eventSubview === 'exhibitors' && $store.app.exhibitorId"
              >
                <div>
                  <button
                    type="button"
                    class="back-link"
                    @click="$store.app.backToExhibitors()"
                  >
                    <span aria-hidden="true">&larr;</span>
                    <span x-text="$store.lang.t('event.back_exhibitors')"></span>
                  </button>
                  <template x-if="exhibitor()">
                    <article class="exhibitor-detail">
                      <h3
                        class="exhibitor-detail__name"
                        x-text="exhibitor().name"
                      ></h3>
                      <p
                        class="exhibitor-detail__booth"
                        x-text="$store.lang.t('event.booth_prefix') + exhibitor().booth"
                      ></p>
                      <p
                        class="exhibitor-detail__desc"
                        x-text="exhibitor().description"
                      ></p>
                      <p x-show="exhibitor().website">
                        <a
                          class="exhibitor-detail__link"
                          :href="exhibitor().website"
                          target="_blank"
                          rel="noopener"
                          x-text="exhibitor().website"
                        ></a>
                      </p>
                    </article>
                  </template>
                  <p
                    class="hint"
                    x-show="!exhibitor()"
                    x-text="$store.lang.t('event.exhibitor_not_found')"
                  ></p>
                </div>
              </template>

              <template x-if="$store.app.eventSubview === 'practical'">
                <div class="practical">
                  <section class="practical__section">
                    <h3 x-text="$store.lang.t('practical.getting_here')"></h3>
                    <p x-text="venue().transport?.summary"></p>
                    <ul>
                      <template
                        x-for="mode in venue().transport?.modes ?? []"
                        :key="mode.mode"
                      >
                        <li>
                          <strong x-text="mode.mode"></strong>:
                          <span x-text="mode.detail"></span>
                        </li>
                      </template>
                    </ul>
                  </section>
                  <section class="practical__section">
                    <h3 x-text="$store.lang.t('practical.parking')"></h3>
                    <p x-text="venue().parking?.summary"></p>
                    <p
                      class="practical__note"
                      x-text="venue().parking?.notes"
                    ></p>
                  </section>
                  <section class="practical__section">
                    <h3 x-text="$store.lang.t('practical.restaurants')"></h3>
                    <ul>
                      <template
                        x-for="r in venue().restaurants ?? []"
                        :key="r.name"
                      >
                        <li>
                          <strong x-text="r.name"></strong>:
                          <span x-text="r.description"></span>
                        </li>
                      </template>
                    </ul>
                  </section>
                  <section class="practical__section">
                    <h3 x-text="$store.lang.t('practical.security')"></h3>
                    <p x-text="venue().security?.summary"></p>
                    <ul>
                      <template
                        x-for="rule in venue().security?.general_rules ?? []"
                        :key="rule"
                      >
                        <li x-text="rule"></li>
                      </template>
                    </ul>
                  </section>
                  <section
                    class="practical__section practical__section--maps"
                    x-show="(venue().maps ?? []).length > 0"
                  >
                    <h3 x-text="$store.lang.t('practical.maps')"></h3>
                    <ul>
                      <template
                        x-for="m in venue().maps ?? []"
                        :key="m.id"
                      >
                        <li>
                          <strong x-text="m.name"></strong>:
                          <span x-text="m.description"></span>
                        </li>
                      </template>
                    </ul>
                  </section>
                  <section
                    class="practical__section practical__section--overrides"
                    x-show="hasOverrides()"
                  >
                    <h3 x-text="$store.lang.t('practical.overrides')"></h3>
                    <dl class="overrides">
                      <template
                        x-for="entry in Object.entries(overrides())"
                        :key="entry[0]"
                      >
                        <div class="overrides__item">
                          <dt x-text="overrideLabel(entry[0])"></dt>
                          <dd x-text="entry[1]"></dd>
                        </div>
                      </template>
                    </dl>
                  </section>
                </div>
              </template>

              <template x-if="$store.app.eventSubview === 'newsletter'">
                <div class="newsletter" x-data="newsletterSignup()">
                  <template x-if="!submitted">
                    <form class="newsletter-form" @submit.prevent="submit()">
                      <p class="newsletter-form__intro">
                        <span x-text="$store.lang.t('newsletter.signup_intro_prefix')"></span>
                        <strong x-text="event().name"></strong>
                        <span x-text="$store.lang.t('newsletter.signup_intro_suffix')"></span>
                      </p>
                      <label class="auth-form__field">
                        <span class="auth-form__label" x-text="$store.lang.t('auth.email')"></span>
                        <input
                          type="email"
                          autocomplete="email"
                          required
                          x-model="email"
                        />
                      </label>
                      <fieldset class="newsletter-form__topics">
                        <legend class="auth-form__label" x-text="$store.lang.t('newsletter.topics_legend')"></legend>
                        <template x-for="topic in topics" :key="topic.key">
                          <label class="newsletter-form__topic">
                            <input
                              type="checkbox"
                              :checked="preferences[topic.key]"
                              @change="preferences[topic.key] = $event.target.checked"
                            />
                            <span x-text="topic.label"></span>
                          </label>
                        </template>
                      </fieldset>
                      <p
                        class="auth-form__error"
                        x-show="error"
                        x-text="error"
                      ></p>
                      <button type="submit" class="auth-form__submit" x-text="$store.lang.t('newsletter.signup_submit')"></button>
                    </form>
                  </template>
                  <template x-if="submitted">
                    <div class="newsletter-success">
                      <p class="newsletter-success__title" x-text="$store.lang.t('newsletter.success_title')"></p>
                      <p class="newsletter-success__body">
                        <span x-text="$store.lang.t('newsletter.success_prefix')"></span>
                        <strong x-text="email"></strong>
                        <span x-text="$store.lang.t('newsletter.success_about')"></span>
                        <strong x-text="event().name"></strong>.
                        <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
                      </p>
                      <button
                        type="button"
                        class="newsletter-success__edit"
                        @click="editAgain()"
                        x-text="$store.lang.t('newsletter.edit')"
                      ></button>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </div>
        </template>

        <p
          class="hint"
          x-show="!event()"
          x-text="$store.lang.t('event.not_found')"
        ></p>
      </section>

      <!-- Auth view: register, sign-in, and simulated social providers.
           Email registration calls supabase.auth.signUp; simulated
           Google / Microsoft buttons call supabase.auth.signInAnonymously
           and stamp the resulting session with a provider label. -->
      <section
        class="view__body"
        x-show="$store.app.view === 'auth'"
        x-data="authView()"
      >
        <div class="auth-card">
          <div class="auth-tabs" role="tablist" aria-label="Auth mode">
            <button
              type="button"
              role="tab"
              class="auth-tabs__tab"
              :class="mode === 'signin' && 'auth-tabs__tab--active'"
              :aria-selected="mode === 'signin'"
              @click="setMode('signin')"
              x-text="$store.lang.t('auth.tab_signin')"
            ></button>
            <button
              type="button"
              role="tab"
              class="auth-tabs__tab"
              :class="mode === 'register' && 'auth-tabs__tab--active'"
              :aria-selected="mode === 'register'"
              @click="setMode('register')"
              x-text="$store.lang.t('auth.tab_register')"
            ></button>
          </div>

          <form class="auth-form" @submit.prevent="submit()">
            <label class="auth-form__field">
              <span class="auth-form__label" x-text="$store.lang.t('auth.email')"></span>
              <input
                type="email"
                autocomplete="email"
                required
                x-model="email"
              />
            </label>
            <label class="auth-form__field" x-show="mode === 'register'">
              <span class="auth-form__label" x-text="$store.lang.t('auth.display_name')"></span>
              <input
                type="text"
                autocomplete="name"
                x-model="displayName"
              />
            </label>
            <label class="auth-form__field">
              <span class="auth-form__label" x-text="$store.lang.t('auth.password')"></span>
              <input
                type="password"
                autocomplete="current-password"
                required
                x-model="password"
              />
            </label>
            <p class="auth-form__error" x-show="error" x-text="error"></p>
            <button
              type="submit"
              class="auth-form__submit"
              :disabled="processing"
            >
              <span x-show="!processing && mode === 'signin'" x-text="$store.lang.t('auth.submit_signin')"></span>
              <span x-show="!processing && mode === 'register'" x-text="$store.lang.t('auth.submit_register')"></span>
              <span x-show="processing" x-text="$store.lang.t('auth.working')"></span>
            </button>
          </form>

          <div class="auth-divider" aria-hidden="true">
            <span x-text="$store.lang.t('auth.or')"></span>
          </div>

          <div class="auth-social">
            <button
              type="button"
              class="auth-social__button"
              :disabled="processing"
              @click="socialSignIn('google')"
            >
              <span x-text="$store.lang.t('auth.continue_google')"></span>
              <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
            </button>
            <button
              type="button"
              class="auth-social__button"
              :disabled="processing"
              @click="socialSignIn('microsoft')"
            >
              <span x-text="$store.lang.t('auth.continue_microsoft')"></span>
              <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
            </button>
          </div>
        </div>
      </section>

      <!-- My Pages view: visible when a user is signed in. Visitors who
           arrive at #/me without a session are nudged to the auth view. -->
      <section
        class="view__body"
        x-show="$store.app.view === 'me'"
        x-data="meView()"
      >
        <template x-if="user()">
          <div class="me">
            <header class="me__header">
              <p class="me__name" x-text="user().display_name"></p>
              <p class="me__email" x-text="user().email"></p>
              <p class="me__provider">
                <span x-text="$store.lang.t('me.signed_in_with')"></span>
                <span x-text="providerLabel(user().auth_provider)"></span>
                <span
                  class="sim-chip"
                  x-show="isSimulated()"
                  x-text="$store.lang.t('sim.chip')"
                ></span>
              </p>
            </header>
            <ul class="me__links">
              <li>
                <button type="button" class="me__link" @click="openTickets()">
                  <span x-text="$store.lang.t('me.my_tickets_link')"></span>
                  <span class="me__link-hint" x-text="ticketCountHint()"></span>
                </button>
              </li>
            </ul>

            <section class="me__section" x-data="newsletterPreferences()">
              <h2 class="me__section-title" x-text="$store.lang.t('newsletter.prefs_title')"></h2>
              <p
                class="placeholder"
                x-show="subscriptions().length === 0 && !venueWide()"
                x-text="$store.lang.t('newsletter.prefs_empty')"
              ></p>

              <label class="newsletter-prefs__venue-row">
                <span class="newsletter-prefs__venue-label">
                  <span x-text="$store.lang.t('newsletter.venue_wide')"></span>
                  <span class="newsletter-prefs__venue-hint" x-text="$store.lang.t('newsletter.venue_wide_hint')"></span>
                </span>
                <input
                  type="checkbox"
                  :checked="!!venueWide()"
                  @change="toggleVenueWide()"
                />
              </label>

              <ul
                class="newsletter-prefs__list"
                x-show="subscriptions().length > 0"
              >
                <template x-for="sub in subscriptions()" :key="sub.id">
                  <li class="newsletter-prefs__item">
                    <div class="newsletter-prefs__header">
                      <p
                        class="newsletter-prefs__event"
                        x-text="sub.event_name"
                      ></p>
                      <button
                        type="button"
                        class="newsletter-prefs__unsubscribe"
                        @click="unsubscribe(sub.id)"
                        x-text="$store.lang.t('newsletter.unsubscribe')"
                      ></button>
                    </div>
                    <ul class="newsletter-prefs__topics">
                      <template x-for="topic in topics" :key="topic.key">
                        <li class="newsletter-prefs__topic">
                          <label>
                            <input
                              type="checkbox"
                              :checked="sub.preferences[topic.key]"
                              @change="togglePreference(sub, topic.key)"
                            />
                            <span x-text="topic.label"></span>
                          </label>
                        </li>
                      </template>
                    </ul>
                  </li>
                </template>
              </ul>
            </section>

            <button
              type="button"
              class="me__signout"
              @click="signOut()"
              x-text="$store.lang.t('me.signout')"
            ></button>
          </div>
        </template>
        <template x-if="!user()">
          <div class="me me--signed-out">
            <p class="placeholder" x-text="$store.lang.t('me.signed_out_hint')"></p>
            <button
              type="button"
              class="auth-form__submit"
              @click="$store.app.goAuth({ view: 'me' })"
              x-text="$store.lang.t('me.signin_or_register')"
            ></button>
          </div>
        </template>
      </section>

      <!-- Purchase view: three-step simulated ticket flow scoped to one
           event. A visitor who lands here while signed out is routed
           through the auth view and returned afterwards. -->
      <section
        class="view__body"
        x-show="$store.app.view === 'purchase'"
        x-data="purchaseView()"
      >
        <template x-if="event()">
          <div class="purchase">
            <header class="purchase__header">
              <p class="purchase__event" x-text="event().name"></p>
              <p class="purchase__dates" x-text="formatDates(event())"></p>
            </header>

            <ol class="purchase__steps" aria-label="Purchase progress">
              <li
                :class="step >= 1 && 'purchase__step--active'"
                x-text="$store.lang.t('purchase.step_ticket')"
              ></li>
              <li
                :class="step >= 2 && 'purchase__step--active'"
                x-text="$store.lang.t('purchase.step_details')"
              ></li>
              <li
                :class="step >= 3 && 'purchase__step--active'"
                x-text="$store.lang.t('purchase.step_confirm')"
              ></li>
            </ol>

            <template x-if="step === 1">
              <div class="purchase__body">
                <h3 class="purchase__step-title" x-text="$store.lang.t('purchase.pick_ticket')"></h3>
                <ul class="ticket-types">
                  <template x-for="t in ticketTypes()" :key="t.id">
                    <li>
                      <button
                        type="button"
                        class="ticket-type"
                        :class="ticketTypeId === t.id && 'ticket-type--selected'"
                        :aria-pressed="ticketTypeId === t.id"
                        @click="ticketTypeId = t.id"
                      >
                        <span class="ticket-type__name" x-text="t.label"></span>
                        <span
                          class="ticket-type__desc"
                          x-text="t.description"
                        ></span>
                        <span
                          class="ticket-type__price"
                          x-text="t.price"
                        ></span>
                      </button>
                    </li>
                  </template>
                </ul>
                <p class="auth-form__error" x-show="error" x-text="error"></p>
                <button
                  class="purchase__primary"
                  type="button"
                  :disabled="!ticketTypeId"
                  @click="continueToDetails()"
                  x-text="$store.lang.t('purchase.continue')"
                ></button>
              </div>
            </template>

            <template x-if="step === 2">
              <form class="purchase__body" @submit.prevent="confirm()">
                <h3 class="purchase__step-title" x-text="$store.lang.t('purchase.attendee_details')"></h3>
                <label class="auth-form__field">
                  <span class="auth-form__label" x-text="$store.lang.t('purchase.attendee_name')"></span>
                  <input
                    type="text"
                    autocomplete="name"
                    required
                    x-model="attendeeName"
                  />
                </label>
                <label class="auth-form__field">
                  <span class="auth-form__label" x-text="$store.lang.t('purchase.attendee_email')"></span>
                  <input
                    type="email"
                    autocomplete="email"
                    required
                    x-model="attendeeEmail"
                  />
                </label>
                <section class="purchase__summary">
                  <h4 class="purchase__summary-title" x-text="$store.lang.t('purchase.summary_title')"></h4>
                  <dl class="purchase__summary-list">
                    <div class="purchase__summary-row">
                      <dt x-text="$store.lang.t('purchase.summary_event')"></dt>
                      <dd x-text="event().name"></dd>
                    </div>
                    <div class="purchase__summary-row">
                      <dt x-text="$store.lang.t('purchase.summary_dates')"></dt>
                      <dd x-text="formatDates(event())"></dd>
                    </div>
                    <div class="purchase__summary-row">
                      <dt x-text="$store.lang.t('purchase.summary_ticket')"></dt>
                      <dd x-text="selectedTicketType()?.label ?? ''"></dd>
                    </div>
                    <div class="purchase__summary-row">
                      <dt x-text="$store.lang.t('purchase.summary_price')"></dt>
                      <dd x-text="selectedTicketType()?.price ?? ''"></dd>
                    </div>
                  </dl>
                  <p class="purchase__sim-note">
                    <span x-text="$store.lang.t('purchase.sim_note_prefix')"></span>
                    <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
                    <span x-text="$store.lang.t('purchase.sim_note_suffix')"></span>
                  </p>
                </section>
                <p class="auth-form__error" x-show="error" x-text="error"></p>
                <button
                  class="purchase__primary"
                  type="submit"
                  :disabled="processing"
                >
                  <span x-show="!processing" x-text="$store.lang.t('purchase.confirm')"></span>
                  <span x-show="processing" x-text="$store.lang.t('purchase.processing')"></span>
                </button>
                <button
                  class="purchase__secondary"
                  type="button"
                  :disabled="processing"
                  @click="goToStep(1)"
                  x-text="$store.lang.t('purchase.back')"
                ></button>
              </form>
            </template>

            <template x-if="step === 3 && confirmedTicket">
              <div class="purchase__body">
                <h3 class="purchase__step-title">
                  <span x-text="$store.lang.t('purchase.ticket_confirmed')"></span>
                  <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
                </h3>
                <p class="purchase__ref">
                  <span x-text="$store.lang.t('purchase.transaction_ref')"></span>
                  <code x-text="confirmedTicket.transaction_ref"></code>
                </p>
                <article class="ticket-card">
                  <header class="ticket-card__header">
                    <p class="ticket-card__event" x-text="event().name"></p>
                    <p
                      class="ticket-card__dates"
                      x-text="formatDates(event())"
                    ></p>
                  </header>
                  <div
                    class="ticket-card__qr"
                    x-html="qrSvgFor(confirmedTicket)"
                  ></div>
                  <dl class="ticket-card__meta">
                    <div class="ticket-card__meta-row">
                      <dt x-text="$store.lang.t('purchase.ticket_field_ticket')"></dt>
                      <dd x-text="confirmedTicket.ticket_type_label"></dd>
                    </div>
                    <div class="ticket-card__meta-row">
                      <dt x-text="$store.lang.t('purchase.ticket_field_attendee')"></dt>
                      <dd x-text="confirmedTicket.attendee_name"></dd>
                    </div>
                  </dl>
                </article>
                <button
                  class="purchase__primary"
                  type="button"
                  @click="$store.app.goTickets()"
                  x-text="$store.lang.t('purchase.view_in_my_tickets')"
                ></button>
                <button
                  class="purchase__secondary"
                  type="button"
                  @click="$store.app.selectEvent(event().id)"
                  x-text="$store.lang.t('purchase.back_to_event')"
                ></button>
              </div>
            </template>
          </div>
        </template>
        <p
          class="hint"
          x-show="!event()"
          x-text="$store.lang.t('event.not_found')"
        ></p>
      </section>

      <!-- My Tickets view: list of purchased tickets for the signed-in
           user, each with a locally generated QR presentation. -->
      <section
        class="view__body"
        x-show="$store.app.view === 'tickets'"
        x-data="myTicketsView()"
      >
        <template x-if="!signedIn()">
          <div class="me me--signed-out">
            <p class="placeholder" x-text="$store.lang.t('tickets.signed_out_hint')"></p>
            <button
              type="button"
              class="auth-form__submit"
              @click="$store.app.goAuth({ view: 'tickets' })"
              x-text="$store.lang.t('me.signin_or_register')"
            ></button>
          </div>
        </template>
        <template x-if="signedIn()">
          <div class="tickets">
            <p
              class="placeholder"
              x-show="tickets().length === 0"
              x-text="$store.lang.t('tickets.empty')"
            ></p>
            <ul class="tickets__list" x-show="tickets().length > 0">
              <template x-for="ticket in tickets()" :key="ticket.id">
                <li>
                  <article class="ticket-card">
                    <header class="ticket-card__header">
                      <p
                        class="ticket-card__event"
                        x-text="eventName(ticket)"
                      ></p>
                      <p
                        class="ticket-card__dates"
                        x-text="eventForTicket(ticket) ? formatDates(eventForTicket(ticket)) : ''"
                      ></p>
                    </header>
                    <div
                      class="ticket-card__qr"
                      x-html="qrSvgFor(ticket)"
                    ></div>
                    <dl class="ticket-card__meta">
                      <div class="ticket-card__meta-row">
                        <dt x-text="$store.lang.t('tickets.field_ticket')"></dt>
                        <dd x-text="ticket.ticket_type_label"></dd>
                      </div>
                      <div class="ticket-card__meta-row">
                        <dt x-text="$store.lang.t('tickets.field_attendee')"></dt>
                        <dd x-text="ticket.attendee_name"></dd>
                      </div>
                      <div class="ticket-card__meta-row">
                        <dt x-text="$store.lang.t('tickets.field_email')"></dt>
                        <dd x-text="ticket.attendee_email"></dd>
                      </div>
                      <div class="ticket-card__meta-row">
                        <dt x-text="$store.lang.t('tickets.field_purchased')"></dt>
                        <dd
                          x-text="formatShortDate(ticket.purchased_at)"
                        ></dd>
                      </div>
                    </dl>
                    <p class="ticket-card__sim">
                      <span x-text="$store.lang.t('tickets.sim_entry_prefix')"></span>
                      <span class="sim-chip" x-text="$store.lang.t('sim.chip')"></span>
                      <span x-text="$store.lang.t('tickets.sim_entry_suffix')"></span>
                    </p>
                  </article>
                </li>
              </template>
            </ul>
          </div>
        </template>
      </section>
    </main>
  </body>
</html>
